<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    
    <!-- Stylized 'N' Gradients -->
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="diagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1e40af" />
    </linearGradient>
  </defs>

  <!-- Solid white/off-white background rounded container -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Outer tablet frame with a modern dark-slate stroke -->
  <rect x="64" y="64" width="384" height="384" rx="56" fill="none" stroke="#0f172a" stroke-width="16" stroke-linejoin="round" />

  <!-- Modern Ribbon Stylized 'N' -->
  <!-- Left Column -->
  <path d="M176,150 L176,362" stroke="url(#leftGrad)" stroke-width="44" stroke-linecap="round" />
  <!-- Diagonal -->
  <path d="M176,165 L336,347" stroke="url(#diagGrad)" stroke-width="44" stroke-linecap="round" />
  <!-- Right Column -->
  <path d="M336,150 L336,362" stroke="url(#rightGrad)" stroke-width="44" stroke-linecap="round" />

  <!-- Floating Digital Pixels (Sparkles) in top-left corner -->
  <rect x="55" y="75" width="22" height="22" rx="5" fill="#60a5fa" />
  <rect x="85" y="45" width="26" height="26" rx="6" fill="#3b82f6" />
  <rect x="120" y="30" width="16" height="16" rx="4" fill="#818cf8" />
  <rect x="35" y="110" width="18" height="18" rx="4" fill="#a78bfa" />
  <rect x="100" y="95" width="12" height="12" rx="3" fill="#c084fc" />
  <rect x="75" y="20" width="14" height="14" rx="3" fill="#38bdf8" />
  <rect x="145" y="65" width="10" height="10" rx="2" fill="#a5b4fc" />

  <!-- Whiteboard Tool Icons faintly aligned inside the right edge of the tablet frame -->
  <!-- Pencil Icon -->
  <g transform="translate(400, 140) scale(0.9)">
    <path d="M0,15 L12,3 L17,8 L5,20 L0,20 Z" fill="#94a3b8" />
    <path d="M0,15 L5,20 L0,20 Z" fill="#64748b" />
  </g>
  <!-- Mouse Pointer Cursor Icon -->
  <g transform="translate(400, 230) scale(0.9)">
    <path d="M2,2 L18,8 L11,11 L16,19 L13,21 L8,13 L2,15 Z" fill="#94a3b8" />
  </g>
  <!-- Eraser Icon -->
  <g transform="translate(398, 315) scale(0.85)">
    <path d="M2,12 L10,4 L20,14 L12,22 Z" fill="#94a3b8" />
    <path d="M6,16 L12,22 M2,12 L12,22" stroke="#64748b" stroke-width="2" />
  </g>
  <!-- Rounded status dot inside bottom-right tablet bezel -->
  <circle cx="408" cy="390" r="6" fill="#cbd5e1" />
</svg>
